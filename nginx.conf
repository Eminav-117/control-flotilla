# Nginx nivel top: worker tuning para uploads concurrentes.
# Default (1 worker, 512 connections) serializa uploads grandes; con `auto` + 1024
# cada core maneja una upload ZIP en paralelo sin bloqueo.
# NOTA: Estas directivas solo tienen efecto si este archivo reemplaza /etc/nginx/nginx.conf
# completo. Si se monta como conf.d/default.conf, ignorarlas (scope server{} no soporta workers).

# Rate limiting zones — declarar a nivel http{} via Dockerfile sed (ver comentario final).
# Placeholder aquí para documentación + fallback soft-enforcement vía limit_req.
# limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
# limit_req_zone $binary_remote_addr zone=upload:10m rate=3r/s;
# limit_req_zone $binary_remote_addr zone=healthz:1m rate=60r/m;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Tamaño máximo upload — la app acepta ZIPs de hasta ~150MB.
    client_max_body_size 200m;
    client_body_timeout 60s;
    client_header_timeout 30s;
    send_timeout 60s;

    # Ocultar versión de nginx en headers + páginas de error.
    server_tokens off;

    # Rate limit general (30 req/s por IP con burst 20 tolerancia).
    # Protege contra scraping agresivo o DoS accidental.
    # Nota: limit_req_zone se declara en Dockerfile (scope http{}).
    limit_req zone=general burst=20 nodelay;
    limit_req_status 429;

    # Gzip Compression
    # level 6 = default, mejor balance CPU/size. Subir a 7-8 da <3% ganancia con CPU 2x.
    # level 1-3 útil solo si CPU saturada (no es nuestro caso — app estática + intranet).
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/wasm image/svg+xml;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    # HSTS — Strict-Transport-Security activado (2 años + preload + subdomains).
    # Requiere TLS upstream (proxy reverso Caddy/nginx corp con certs válidos).
    # Si se sirve puro HTTP, browser ignora este header — no rompe.
    # Para remover HSTS de un browser (dev): navegar chrome://net-internals/#hsts y delete.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Content Security Policy (Rigurosa para Intranet)
    # script-src usa 'sha256-*' hashes (sin 'unsafe-inline') — cada inline <script>
    # block autorizado explícitamente. Regenerar con: node scripts/compute-csp-hashes.mjs
    # tras cualquier edit a inline <script>.
    # style-src mantiene 'unsafe-inline' — 394 inline styles (documented gap).
    # connect-src 'self' bloquea exfiltración a CDNs externas.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-spoNzrFYGIL2O8R7ecquXngwmbxgYk7nmX1xlwYjExU=' 'sha256-Z7Mjh1RPn3a8kg8hBt3qldUGzKcjKTtyzXtc2X70hWc=' 'sha256-uyyxlbeXQNSZRUaWKeF8PEKDyrK9RlIbGSJBr24t62w=' 'sha256-iEgK0NmMjKDP/w4d4hKmcd6tB49OEOLIJSuUmMZ26LQ='; script-src-attr 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data: https://*.amazonaws.com; connect-src 'self' https://*.amazonaws.com wss://*.amazonaws.com https://*.amazoncognito.com; font-src 'self' data:; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    # Healthcheck endpoint dedicado — devuelve 200 + cuerpo simple.
    # Usado por Docker HEALTHCHECK; más confiable que GET / (que cachea).
    # Rate limit dedicado (60/min) para evitar abuse.
    location = /healthz {
        limit_req zone=healthz burst=5 nodelay;
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location / {
        try_files $uri $uri/ /index.html;

        # PWA / Service Worker: No cache para asegurar actualizaciones inmediatas
        location ~* (service-worker\.js|sw\.js)$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires off;
        }

        # Estáticos con hash: Cache agresiva (1 año).
        # ESTRATEGIA DE CACHE-BUST DE EMERGENCIA:
        # Vite emite nombres con hash (ej. app-a8f3c2.js) — cambios invalidan URL automáticamente.
        # Si se despliega bug crítico y clientes tienen cache stale por `immutable`:
        #   1) Hotfix inmediato: bump `version` en package.json + rebuild (Vite rehashea TODO).
        #   2) Force refresh usuarios: cambiar nombre de `index.html` (ej. index.html → main.html)
        #      en nginx, o servir con query string `?v=YYYYMMDD` temporalmente.
        #   3) SW (sw.js) NO cachea (regla arriba) — al recargar, SW descarga nuevo manifest y
        #      dispara `skipWaiting` para forzar update.
        # NUNCA editar archivo con mismo nombre y confiar en `immutable`: browser lo ignora.
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Rutas /api/* devuelven 404 explícito en lugar de SPA index (evita masquerade).
    location /api/ {
        return 404;
    }

    # Error pages
    # 404: la app es SPA — try_files arriba ya cae a index.html. Si el recurso
    # solicitado fue un asset (JS/CSS/imagen con hash) que no existe, 404 explícito
    # es correcto — evita servir index.html con MIME type equivocado.
    error_page 404 =404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /404.html {
        internal;
        add_header Content-Type text/html;
        return 404 '<!DOCTYPE html><html><head><title>404</title></head><body style="font-family:system-ui;padding:40px;text-align:center"><h1>404 — Recurso no encontrado</h1><p>Si esperabas la app, <a href="/">regresa al inicio</a>.</p></body></html>';
    }
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
