version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --prefer-offline --no-audit
        # Amplify Gen 2 deploy: lee amplify/backend.ts + sub-resources
        # (auth/data/storage) y synthesiza CDK stacks contra la cuenta AWS
        # configurada en el service role del app.
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --prefer-offline --no-audit
    build:
      commands:
        - npm run build
        # Amplify default root es index.html — duplicamos el HTML principal
        # para que la URL raíz cargue la app sin redirect adicional.
        - cp "dist/Control de flotilla.html" dist/index.html
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .npm/**/*
